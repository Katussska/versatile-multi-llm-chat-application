services:
  db:
    image: postgres:16-alpine
    container_name: cognify-postgres
    restart: always
    environment:
      POSTGRES_USER: ${MIKRO_ORM_USER:-postgres}
      POSTGRES_PASSWORD: ${MIKRO_ORM_PASSWORD:-postgres}
      POSTGRES_DB: ${MIKRO_ORM_DB:-cognify}
    ports:
      - "${MIKRO_ORM_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Auto-run migrations or seeds on startup
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: